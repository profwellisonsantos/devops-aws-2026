name: Intregar continuamente com Docker

on: [push]

jobs:
  integracao:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: wellisonraul/eletivadevops:${{ github.run_id }}
      
  entrega:
    needs: integracao
    runs-on: prod
    
    steps: 
      - uses: actions/checkout@v6

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Provisionando o servico
        run: |
          docker compose up -d 
    
